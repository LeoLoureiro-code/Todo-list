<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
  <title>Todo app</title>
</head>
<body class="light">
  <div class="container">
  <header> 
    <p class="logo">TODO</p>
    <div class="theme-div"> 
      <img src="./images/icon-moon.svg" alt="moon icon" class="theme_img"> 
    </div> 
  </header> 
  <main> 
    <form action="#">
      <input type="text" id="todo_input" placeholder="Create a new todo...">
    </form>
    <div class="todos_container">
      <ul class="todos_list">
      </ul>
    </div>
    <div class="options">
      <span class="items_left"></span>
      <button class="clear_complete">Clear Completed</button>
    </div>
    <div class="filter_div">
      <button class="filter_button" data-filter="all">All</button>
      <button class="filter_button" data-filter="active">Active</button>
      <button class="filter_button" data-filter="completed">Completed</button>
    </div>
  </main>
  <footer>
    <p class="drag_drop_paragraph">Drag and drop to reorder list</p>
  </footer>
  </div>
  <script src="./scripts.js" defer></script>
</body>
</html>
