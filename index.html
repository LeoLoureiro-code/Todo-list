<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
  <title>Todo app</title>
</head>
<body class="theme1">
  <div class="container">
  <header> 
    <p class="logo">TODO</p>
    <div class="theme-div"> 
      <img src="./images/icon-moon.svg" alt="moon icon" class="theme_img"> 
    </div> 
  </header> 
  <main> 
    <form action="">
      <input type="text" placeholder="Create a new todo...">
    </form>
    <div class="todos_container">
      <ul class="todos_list">
        <li class="todos_item">
          <div class="todos_content">
          <div class="todos_complete">
            <img src="images/icon-check.svg" alt="check icon">
          </div>
              <p class="todos_paragraph">Jog around the park 3x</p>
          </div>
          <img src="images/icon-cross.svg" alt="cross icon" class="todos_eliminate">
        </li>
        <li class="todos_item">
          <div class="todos_content">
            <div class="todos_complete">
              <img src="images/icon-check.svg" alt="check icon">
            </div>
            <p class="todos_paragraph">10 minutes meditation</p>
          </div>
          <img src="images/icon-cross.svg" alt="cross icon" class="todos_eliminate">
        </li>
      </ul>
    </div>
  </main>
  </div>
</body>
</html>
